[flake8]
# Set maximum line length to 88 characters (same as black default)
max-line-length = 88
# Ignore some common flake8 errors
ignore = E203, E266, E501, W503
# Exclude directories
exclude = 
    .git,
    __pycache__,
    .venv,
    venv,
    env,
    .env,
    node_modules,
    .next,
    build,
    dist,
    migrations