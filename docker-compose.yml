services:
  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: plagiarism1_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin1
      MINIO_ROOT_PASSWORD: minioadmin1
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    networks:
      - plagiarism
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: plagiarism_milvus_etcd1
    restart: always
    command: >
      etcd
      -advertise-client-urls=http://0.0.0.0:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    ports:
      - "2379:2379"
    networks:
      - plagiarism

  milvus:
    image: milvusdb/milvus:v2.4.3
    container_name: plagiarism_milvus1
    restart: always
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin1
      MINIO_SECRET_KEY: minioadmin1
      MINIO_USE_SSL: "false"
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"   # Milvus gRPC
      - "9091:9091"     # Milvus HTTP (REST)
    depends_on:
      - milvus-etcd
      - minio
    networks:
      - plagiarism

  attu:
    image: zilliz/attu:latest
    container_name: plagiarism_attu1
    restart: always
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8000:3000"
    depends_on:
      - milvus
    networks:
      - plagiarism

volumes:
  minio_data:
  etcd_data:
  milvus_data:

networks:
  plagiarism:
    name: plagiarism
    driver: bridge
