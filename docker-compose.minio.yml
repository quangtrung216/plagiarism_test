version: '3.8'

services:
  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: plagiarism_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    networks:
      - plagiarism_network
    command: server /data --console-address ":9001"

# Volumes
volumes:
  minio_data:

# Networks
networks:
  plagiarism_network:
    driver: bridge