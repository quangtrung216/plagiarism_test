version: '3.8'

services:
  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: plagiarism_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    networks:
      - plagiarism_network
    command: server /data --console-address ":9001"

  milvus-etcd:
    image:  quay.io/coreos/etcd:v3.5.5
    container_name: plagiarism_milvus_etcd
    restart: always
    command:  >
      etcd
      -advertise-client-urls=http://0.0.0.0:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    ports:
      - "2379:2379"
    networks:
      - plagiarism_network
  milvus:
    image: milvusdb/milvus:v2.4.3
    container_name: plagiarism_milvus
    restart: always
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"

    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"   # Milvus gRPC
      - "9091:9091"     # Milvus REST
    depends_on:
      - milvus-etcd
      - minio
    networks:
      - plagiarism_network
  attu:
    image: zilliz/attu:latest
    container_name: plagiarism_attu
    restart: always
    ports:
      - "8000:3000"
    networks:
      - plagiarism_network

# Volumes
volumes:
  minio_data:
  etcd_data:
  milvus_data:

# Networks
networks:
  plagiarism_network:
    driver: bridge